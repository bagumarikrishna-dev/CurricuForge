<!DOCTYPE html>
<html>
<head>
    <title>CurricuForge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>CurricuForge</h1>

    <input id="course" placeholder="Course Name">
    <input id="duration" placeholder="Duration">
    <input id="level" placeholder="Level">
    <button onclick="generate()">Generate Curriculum</button>

    <pre id="output"></pre>

    <script>
        async function generate() {
            const res = await fetch("http://127.0.0.1:8000/generate-curriculum", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    course_name: document.getElementById("course").value,
                    duration: document.getElementById("duration").value,
                    level: document.getElementById("level").value
                })
            });
            const data = await res.json();
            document.getElementById("output").textContent = JSON.stringify(data, null, 2);
        }
    </script>
</body>
</html>
